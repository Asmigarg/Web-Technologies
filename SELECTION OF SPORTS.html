<!DOCTYPE html>
<html>
    <head>
        <title>SPORTS SELECTION</title>
        <style>
            body{
                font-family:Arial,fantasy;
                background-image:linear-gradient(to bottom left,rgb(21, 72, 223),rgb(229, 22, 208));
                margin: 10px;
                padding:10px;
                display:flex;
                justify-content:center;
                align-items:center;
                height:100vh;
            }
            .sports-selection-container {
      background-color: rgba(255,255,255,0.5);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      width: 300px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 8px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
    }

    button {
      background-color: #774caf;
      color: #fff;
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="sports-selection-container">
    <h2>University Sports Selection</h2>
    <form action="#" method="post">
      <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>
      </div>

      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required>
      </div>

      <div class="form-group">
        <label for="address">Address:</label>
        <input type="text" id="address" name="address" placeholder="Enter address" required>
      </div>

      <div class="form-group">
        <label for="selectGame">Select Game:</label>
        <select id="selectGame" name="selectGame" required>
          <option value="" disabled selected>Select a game</option>
          <option value="football">Football</option>
          <option value="basketball">Basketball</option>
          <option value="tennis">Tennis</option>
          <option value="badminton">Badminton</option>
          <option value="cricket">Cricker</option>
        </select>
      </div>

      <div class="form-group">
        <label for="gender">Gender:</label>
        <select id="gender" name="gender" required>
          <option value="" disabled selected>Select gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" min="1" placeholder="Enter your age" required>
      </div>

      <button type="submit">Submit</button>
    </form>
  </div>

</body>
</html>
        </style>
