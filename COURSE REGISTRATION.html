<!DOCTYPE html>
<html>
    <head>
        <title>COURSE REGISTRATION</title>
        <style>
            body{
                font-family:arial,sans-serif;
                background-image:url("uni3.jpeg");
                background-size:cover;
                margin:0;             
                display:flex;
                align-items:center;
                justify-content:center;
                height:100vh; 
            }
            .registration-container{
                background-color:rgba(255,255,255,0.5);
                padding:20px;
                border-radius:8px;
                box-shadow:0 0 10px rgba(0,0,0,0.1);
                width:300px;
            }
            .form group{
                margin-bottom:15px;
            }
            label {
                display: block;
                margin-bottom: 5px;
            }
            input, select {
                width: 100%;
                padding: 8px;
                margin-bottom:5px;
                box-sizing: border-box;
            }
            button {
                background-color: #2727dd;
                color: #fff;
                padding: 10px;
                border: 1px;
                border-radius: 6px;
                cursor: pointer;
                width: 100%;
            }
            </style>
            </head>
            <body>
                <div class="registration-container">
                <h2 align="center">Student Course Registration</h2>
                <form action="#" method="post">
                <div class="form-group">
                <label for="studentName">Student Name:</label>
                <input type="text" id="studentName" name="studentName" required>
            </div>

                <div class="form-group">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" min="1" required>
            </div>

                <div class="form-group">
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="dob" required>
            </div>

                <div class="form-group">
                <label for="selectCourse">Select Course:</label>
                <select id="selectCourse" name="selectCourse" required>
                <option value = "Course"> Course </option>
                <option value = "M.Tech"> M.Tech </option>
                <option value = "B.Tech"> B.Tech </option>
                <option value = "LL.B. 5 year"> LL.B. 5 year </option>
                <option value = "MBA"> MBA </option>
                <option value = "LL.M."> LL.M. </option>
                <option value = "BBA"> BBA </option>
                <option value = "M.Des."> M.Des. </option>
                <option value = "B.Des."> B.Des. </option>
                <option value = "BA"> BA </option>
                <option value = "MCA"> MCA </option>
                <option value = "BCA"> BCA </option>
                <option value = "B.Com."> B.Com. </option>
                <option value = "B.Sc."> B.Sc. </option>
                <option value = "B.Pharma"> B.Pharma </option>
                <option value = "M.Sc."> M.Sc. </option>
                <option value = "Integrated (B.Com.(Hons.)) - (MBA)"> Integrated (B.Com.(Hons.)) - (MBA) </option>
            </select>
        </div>

      <button type="submit">Submit</button>
    </form>
  </div>
</body>
</html>
